<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家护家电 | 智能客服助手</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b4e 50%, #4a2c6d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            min-height: 600px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(156, 100, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 紫色渐变头部 */
        .chat-header {
            background: linear-gradient(135deg, #6c3fd6 0%, #9b59b6 50%, #e88dff 100%);
            color: white;
            padding: 20px 24px;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }

        .chat-header h1 {
            font-size: 26px;
            margin-bottom: 6px;
            letter-spacing: 1px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .chat-header h1::before {
            content: "🏠";
            font-size: 28px;
        }

        .chat-header h1::after {
            content: "💜";
            font-size: 28px;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .chat-header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd6ff, #ffb3ff, transparent);
            border-radius: 3px;
        }

        /* iframe 容器 - 占据剩余全部空间 */
        .iframe-wrapper {
            flex: 1;
            position: relative;
            background: #f8f3ff;
            min-height: 0;
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f0e6ff;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: #c084fc;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a855f7;
        }

        /* 响应式调整 */
        @media (max-width: 640px) {
            .chat-container {
                width: 100%;
                height: 95vh;
                border-radius: 24px;
            }

            .chat-header h1 {
                font-size: 20px;
            }

            .chat-header h1::before,
            .chat-header h1::after {
                font-size: 22px;
            }
        }

        /* 加载提示 */
        .iframe-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #9b59b6;
            font-size: 14px;
            background: white;
            padding: 12px 24px;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>家护家电智能客服助手</h1>
            <p>基于产品知识库 · 7×24小时为您服务 💜</p>
        </div>

        <!-- iframe 容器 - FastGPT 完整客服界面 -->
        <div class="iframe-wrapper">
            <div class="iframe-loading" id="iframeLoading">✨ 加载智能客服中...</div>
            <iframe
                id="fastgptFrame"
                src="https://cloud.fastgpt.cn/chat/share?shareId=opMyO5ndFWuQYv3JKGzxTx7r"
                title="家护家电智能客服"
                allow="microphone; clipboard-read; clipboard-write"
                sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"
                loading="lazy">
            </iframe>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('fastgptFrame');
        const loadingDiv = document.getElementById('iframeLoading');

        // iframe 加载完成后隐藏加载提示
        iframe.addEventListener('load', function() {
            if (loadingDiv) {
                loadingDiv.style.opacity = '0';
                setTimeout(() => {
                    loadingDiv.style.display = 'none';
                }, 300);
            }
        });

        // 超时隐藏（防止加载失败时一直显示）
        setTimeout(() => {
            if (loadingDiv && loadingDiv.style.display !== 'none') {
                loadingDiv.style.opacity = '0';
                setTimeout(() => {
                    if (loadingDiv) loadingDiv.style.display = 'none';
                }, 300);
            }
        }, 8000);
    </script>
</body>
</html>
